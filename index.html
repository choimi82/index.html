
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.wrap{padding:1.25rem 1rem 2.5rem;max-width:680px;font-family:var(--font-sans);}
.big-title{font-size:22px;font-weight:500;color:var(--color-text-primary);margin-bottom:5px;}
.sub{font-size:14px;color:var(--color-text-secondary);margin-bottom:1.25rem;line-height:1.6;}
.ai-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.ai-btn{display:flex;align-items:center;gap:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);border-radius:20px;padding:6px 14px;font-size:14px;cursor:pointer;font-weight:400;transition:all .15s;}
.ai-btn.gpt-on{background:#10a37f;border-color:#10a37f;color:#fff;font-weight:500;}
.ai-btn.gem-on{background:#4285F4;border-color:#4285F4;color:#fff;font-weight:500;}
.ai-btn:hover:not(.gpt-on):not(.gem-on){border-color:var(--color-border-primary);color:var(--color-text-primary);}
.ai-guide{border-radius:var(--border-radius-md);padding:9px 13px;font-size:13px;line-height:1.7;margin-bottom:1rem;display:none;}
.ai-guide.show{display:block;}
.ai-guide.gpt{background:#e6f7f2;color:#07503c;border:0.5px solid #9FE1CB;}
.ai-guide.gem{background:#e8f0fe;color:#1a3a8f;border:0.5px solid #b5d4f4;}
.tab-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.25rem;}
.tab{border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);border-radius:20px;padding:6px 13px;font-size:13px;cursor:pointer;transition:all .15s;}
.tab.active{background:#2C2C2A;border-color:#2C2C2A;color:#fff;font-weight:500;}
.tab:hover:not(.active){border-color:var(--color-border-primary);color:var(--color-text-primary);}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.1rem 1.1rem .9rem;margin-bottom:1.1rem;}
.card-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:9px;}
.tbox{background:var(--color-background-secondary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);padding:13px 13px 9px;margin-bottom:9px;font-size:15px;line-height:2.2;color:var(--color-text-primary);}
.ii{display:inline-block;background:transparent;border:none;border-bottom:2px solid #888780;font-size:15px;color:var(--color-text-primary);font-weight:500;padding:1px 5px;margin:0 2px;min-width:65px;max-width:170px;outline:none;font-family:var(--font-sans);vertical-align:baseline;transition:border-color .15s,background .15s;}
.ii::placeholder{color:#B4B2A9;font-weight:400;opacity:1;}
.ii:focus{border-bottom-color:#2C2C2A;background:var(--color-background-secondary);border-radius:4px 4px 0 0;}
.hint{font-size:12px;color:var(--color-text-tertiary);margin-bottom:10px;line-height:1.6;}
.custom-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:11px 13px;margin-bottom:10px;}
.custom-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px;}
.custom-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:7px;}
.custom-row textarea{flex:1;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;font-family:var(--font-sans);padding:7px 10px;resize:vertical;min-height:58px;outline:none;line-height:1.6;}
.custom-row textarea:focus{border-color:var(--color-border-primary);}
.add-btn{border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);border-radius:var(--border-radius-md);padding:7px 12px;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.add-btn:hover{border-color:var(--color-border-primary);color:var(--color-text-primary);}
.chips-row{display:flex;flex-wrap:wrap;gap:6px;min-height:4px;}
.chip{background:#E6F1FB;color:#0C447C;border-radius:20px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:5px;}
.chip-del{cursor:pointer;font-size:14px;opacity:.6;line-height:1;}
.chip-del:hover{opacity:1;}
.res-area{display:none;background:#EAF3DE;border:0.5px solid #C0DD97;border-radius:var(--border-radius-md);padding:11px 13px;font-size:14px;color:#173404;line-height:1.8;margin-bottom:10px;word-break:break-all;}
.res-area.show{display:block;}
.res-lbl{font-size:11px;font-weight:500;color:#3B6D11;margin-bottom:5px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.btn-make{background:#2C2C2A;color:#fff;border:none;border-radius:var(--border-radius-md);padding:9px 18px;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;}
.btn-make:hover{background:#444441;}
.btn-copy{background:var(--color-background-secondary);color:var(--color-text-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:9px 14px;font-size:14px;cursor:pointer;display:none;transition:all .15s;}
.btn-copy.show{display:block;}
.copy-ok{font-size:12px;color:#3B6D11;display:none;align-items:center;gap:4px;padding-top:6px;width:100%;}
.copy-ok.show{display:flex;}
.next-tip{border-radius:var(--border-radius-md);padding:9px 13px;font-size:12px;line-height:1.7;margin-top:7px;display:none;}
.next-tip.show{display:block;}
.next-tip.gpt{background:#e6f7f2;color:#07503c;border:0.5px solid #9FE1CB;}
.next-tip.gem{background:#e8f0fe;color:#1a3a8f;border:0.5px solid #b5d4f4;}
.next-tip.none{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);}
.sec{display:none;}
.sec.active{display:block;}
</style>

<div class="wrap">
<h2 class="sr-only">시니어를 위한 AI 질문 만들기 도우미</h2>
<p class="big-title">✏️ AI 질문 만들기 도우미</p>
<p class="sub">주제를 고르고 → 빈칸을 채우고 → 복사해서 붙여넣으세요!</p>

<div class="ai-row">
  <button class="ai-btn" id="btnGpt" onclick="selAI('gpt')">ChatGPT</button>
  <button class="ai-btn" id="btnGem" onclick="selAI('gem')">Gemini</button>
</div>
<div class="ai-guide gpt" id="gGpt"><strong>ChatGPT 사용법</strong><br>① <a href="https://chat.openai.com" target="_blank" style="color:#07503c">chat.openai.com</a> 접속 → ② 질문 완성 → ③ 복사 → ④ 입력창에 Ctrl+V → ⑤ 엔터</div>
<div class="ai-guide gem" id="gGem"><strong>Gemini 사용법</strong><br>① <a href="https://gemini.google.com" target="_blank" style="color:#1a3a8f">gemini.google.com</a> 접속 → ② 질문 완성 → ③ 복사 → ④ 입력창에 Ctrl+V → ⑤ 엔터</div>

<div class="tab-row" id="tabs">
  <button class="tab active" data-t="0">건강·음식</button>
  <button class="tab" data-t="1">여행·나들이</button>
  <button class="tab" data-t="2">생활 정보</button>
  <button class="tab" data-t="3">취미·배우기</button>
  <button class="tab" data-t="4">가족·손자</button>
  <button class="tab" data-t="5">병원 안내</button>
  <button class="tab" data-t="6">갤럭시 사용법</button>
  <button class="tab" data-t="7">보이스피싱</button>
</div>

<div id="secWrap"></div>
</div>

<script>
let curAI = '';
const results = {};
const appends = {};
for(let i=0;i<8;i++) appends[i]=[];

function selAI(ai){
  curAI = ai;
  document.getElementById('btnGpt').className = 'ai-btn'+(ai==='gpt'?' gpt-on':'');
  document.getElementById('btnGem').className = 'ai-btn'+(ai==='gem'?' gem-on':'');
  document.getElementById('gGpt').className = 'ai-guide gpt'+(ai==='gpt'?' show':'');
  document.getElementById('gGem').className = 'ai-guide gem'+(ai==='gem'?' show':'');
}

const tabData = [
  {
    id:0,
    hint:'예: 나는 72살이고 혈압이 높아요. 삼겹살을 먹어도 괜찮은지 알려줘.',
    html:`나는 <input class="ii" id="s0a" placeholder="나이" style="width:60px">살이고,
<input class="ii" id="s0b" placeholder="예: 혈압이 높아요" style="width:155px">.<br>
<input class="ii" id="s0c" placeholder="예: 삼겹살" style="width:100px">을/를 먹어도 괜찮은지 알려줘.<br>
건강에 좋은 대체 음식도 같이 알려줘. 어려운 말 말고 쉽게 설명해줘.`,
    build:function(){
      const a=gv('s0a')||'___', b=gv('s0b')||'___', c=gv('s0c')||'___';
      return `나는 ${a}살이고, ${b}. ${c}을/를 먹어도 괜찮은지 알려줘. 건강에 좋은 대체 음식도 같이 알려줘. 어려운 말 말고 쉽게 설명해줘.`;
    }
  },
  {
    id:1,
    hint:'예: 부부 둘이 경주에 2박 3일로 가는 여행 코스를 짜줘.',
    html:`<input class="ii" id="s1a" placeholder="예: 부부 둘이" style="width:120px"> 여행하려고 해.<br>
<input class="ii" id="s1b" placeholder="예: 경주" style="width:90px">에
<input class="ii" id="s1c" placeholder="예: 2박 3일" style="width:90px">로 가는 여행 코스를 짜줘.<br>
무릎이 좋지 않아서 많이 걷지 않아도 되는 곳 위주로 알려줘.<br>
맛집과 숙소 추천도 함께 부탁해.`,
    build:function(){
      const a=gv('s1a')||'___', b=gv('s1b')||'___', c=gv('s1c')||'___';
      return `${a} 여행하려고 해. ${b}에 ${c}로 가는 여행 코스를 짜줘. 무릎이 좋지 않아서 많이 걷지 않아도 되는 곳 위주로 알려줘. 맛집과 숙소 추천도 함께 부탁해.`;
    }
  },
  {
    id:2,
    hint:'예: 국민연금 수령 나이와 금액을 쉽게 설명해줘.',
    html:`<input class="ii" id="s2a" placeholder="예: 국민연금" style="width:130px">에 대해 알고 싶어.<br>
특히 <input class="ii" id="s2b" placeholder="예: 수령 나이와 금액" style="width:165px">를 알려줘.<br>
70대 어르신도 이해할 수 있게 아주 쉽게, 어려운 말은 풀어서 설명해줘.`,
    build:function(){
      const a=gv('s2a')||'___', b=gv('s2b')||'___';
      return `${a}에 대해 알고 싶어. 특히 ${b}를 알려줘. 70대 어르신도 이해할 수 있게 아주 쉽게, 어려운 말은 풀어서 설명해줘.`;
    }
  },
  {
    id:3,
    hint:'예: 수채화 그리기를 배우고 싶어. 완전 초보인데 단계별로 알려줘.',
    html:`나는 <input class="ii" id="s3a" placeholder="예: 수채화 그리기" style="width:155px">를 배우고 싶어.<br>
완전 초보인데, 처음에 뭘 준비하면 되고 어떻게 시작하면 좋은지 단계별로 알려줘.<br>
비용도 얼마나 드는지 알려줘.`,
    build:function(){
      const a=gv('s3a')||'___';
      return `나는 ${a}를 배우고 싶어. 완전 초보인데, 처음에 뭘 준비하면 되고 어떻게 시작하면 좋은지 단계별로 알려줘. 비용도 얼마나 드는지 알려줘.`;
    }
  },
  {
    id:4,
    hint:'예: 손자가 8살인데 생일 선물로 3만원 안에서 좋은 걸 추천해줘.',
    html:`손자/손녀가 <input class="ii" id="s4a" placeholder="예: 8살" style="width:65px">인데,<br>
<input class="ii" id="s4b" placeholder="예: 생일 선물" style="width:110px">로
<input class="ii" id="s4c" placeholder="예: 3만원" style="width:80px"> 예산 안에서 좋은 걸 추천해줘.<br>
요즘 아이들이 좋아하는 것 위주로 알려줘. 어디서 살 수 있는지도 알려줘.`,
    build:function(){
      const a=gv('s4a')||'___', b=gv('s4b')||'___', c=gv('s4c')||'___';
      return `손자/손녀가 ${a}인데, ${b}로 ${c} 예산 안에서 좋은 걸 추천해줘. 요즘 아이들이 좋아하는 것 위주로 알려줘. 어디서 살 수 있는지도 알려줘.`;
    }
  },
  {
    id:5,
    hint:'예: 무릎이 자꾸 아파요. 어느 과에 가야 해?',
    html:`<input class="ii" id="s5a" placeholder="예: 무릎이 자꾸 아파요" style="width:200px">.<br>
어느 병원 진료과에 가야 하는지 알려줘.<br>
동네 의원으로 가면 되는지, 큰 병원에 가야 하는지도 알려줘.<br>
병원 가기 전에 준비할 것도 알려줘. 쉽게 설명해줘.`,
    build:function(){
      const a=gv('s5a')||'___';
      return `${a}. 어느 병원 진료과에 가야 하는지 알려줘. 동네 의원으로 가면 되는지, 큰 병원에 가야 하는지도 알려줘. 병원 가기 전에 준비할 것도 알려줘. 쉽게 설명해줘.`;
    }
  },
  {
    id:6,
    hint:'예: 갤럭시 폰으로 사진을 찍고 카카오톡으로 보내는 방법을 알려줘.',
    html:`갤럭시 스마트폰으로
<input class="ii" id="s6a" placeholder="예: 사진 찍어서 카톡으로 보내기" style="width:230px"><br>
하는 방법을 알려줘.<br>
스마트폰을 잘 모르는 70대 어르신도 따라할 수 있게<br>
번호를 매겨서 한 단계씩 아주 쉽게 설명해줘.`,
    build:function(){
      const a=gv('s6a')||'___';
      return `갤럭시 스마트폰으로 ${a} 하는 방법을 알려줘. 스마트폰을 잘 모르는 70대 어르신도 따라할 수 있게 번호를 매겨서 한 단계씩 아주 쉽게 설명해줘.`;
    }
  },
  {
    id:7,
    hint:'예: 검사라고 전화가 왔어요. 보이스피싱인지 어떻게 해야 해?',
    html:`<input class="ii" id="s7a" placeholder="예: 검사라고 전화가 왔어요" style="width:215px">.<br>
이게 보이스피싱인지 의심돼. 어떻게 해야 하는지 알려줘.<br>
속지 않으려면 어떻게 하면 되고, 신고는 어디에 하는지도 알려줘.<br>
쉽고 짧게 설명해줘.`,
    build:function(){
      const a=gv('s7a')||'___';
      return `${a}. 이게 보이스피싱인지 의심돼. 어떻게 해야 하는지 알려줘. 속지 않으려면 어떻게 하면 되고, 신고는 어디에 하는지도 알려줘. 쉽고 짧게 설명해줘.`;
    }
  }
];

function gv(id){ const el=document.getElementById(id); return el ? el.value.trim() : ''; }

function renderSections(){
  const wrap = document.getElementById('secWrap');
  tabData.forEach(function(d){
    const div = document.createElement('div');
    div.className = 'sec';
    div.id = 'sec'+d.id;
    div.innerHTML =
      '<div class="card">' +
        '<p class="card-label">📋 빈칸을 채워서 질문을 완성하세요</p>' +
        '<div class="tbox">'+d.html+'</div>' +
        '<p class="hint">💡 '+d.hint+'</p>' +
        '<div class="custom-box">' +
          '<p class="custom-label">✏️ 추가하거나 바꾸고 싶은 내용이 있으면 쓰세요 (선택사항)</p>' +
          '<div class="custom-row">' +
            '<textarea id="cust'+d.id+'" placeholder="예: 서울 강남 근처로 알려줘 / 비용도 알려줘 / 더 자세하게"></textarea>' +
            '<button class="add-btn" onclick="addChip('+d.id+')">+ 추가</button>' +
          '</div>' +
          '<div class="chips-row" id="chips'+d.id+'"></div>' +
        '</div>' +
        '<div class="res-area" id="res'+d.id+'">' +
          '<p class="res-lbl">✅ 완성된 질문 — 복사해서 AI 창에 붙여넣으세요!</p>' +
          '<span id="rest'+d.id+'"></span>' +
        '</div>' +
        '<div class="btn-row">' +
          '<button class="btn-make" onclick="make('+d.id+')">✅ 질문 완성하기</button>' +
          '<button class="btn-copy" id="copy'+d.id+'" onclick="copyIt('+d.id+')">📋 복사하기</button>' +
        '</div>' +
        '<div class="copy-ok" id="ok'+d.id+'">✔ 복사됐어요! AI 창에 붙여넣기(Ctrl+V) 하세요.</div>' +
        '<div class="next-tip" id="nxt'+d.id+'"></div>' +
      '</div>';
    wrap.appendChild(div);
  });
}

renderSections();
document.getElementById('sec0').classList.add('active');

document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click', function(){
    const i = t.dataset.t;
    document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
    document.querySelectorAll('.sec').forEach(function(x){ x.classList.remove('active'); });
    t.classList.add('active');
    document.getElementById('sec'+i).classList.add('active');
  });
});

function addChip(i){
  const ta = document.getElementById('cust'+i);
  const txt = ta.value.trim();
  if(!txt) return;
  appends[i].push(txt);
  ta.value = '';
  renderChips(i);
}

function delChip(i, idx){
  appends[i].splice(idx, 1);
  renderChips(i);
}

function renderChips(i){
  const row = document.getElementById('chips'+i);
  row.innerHTML = '';
  appends[i].forEach(function(txt, idx){
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = '<span>'+txt+'</span><span class="chip-del" onclick="delChip('+i+','+idx+')">✕</span>';
    row.appendChild(chip);
  });
}

const tipMap = {
  gpt:'➡ <strong>ChatGPT에 붙여넣기:</strong> chat.openai.com → 입력창 클릭 → Ctrl+V → 엔터',
  gem:'➡ <strong>Gemini에 붙여넣기:</strong> gemini.google.com → 입력창 클릭 → Ctrl+V → 엔터',
  '':'➡ 위에서 <strong>ChatGPT</strong> 또는 <strong>Gemini</strong>를 먼저 선택하세요!'
};

function make(i){
  let base = tabData[i].build();
  const extras = appends[i].filter(function(x){ return x && x.trim(); });
  if(extras.length > 0){
    base += ' ' + extras.join(' ');
  }
  results[i] = base;
  document.getElementById('rest'+i).textContent = base;
  document.getElementById('res'+i).classList.add('show');
  document.getElementById('copy'+i).classList.add('show');
  document.getElementById('ok'+i).classList.remove('show');
  const nxt = document.getElementById('nxt'+i);
  nxt.innerHTML = tipMap[curAI] || tipMap[''];
  nxt.className = 'next-tip show ' + (curAI || 'none');
}

function copyIt(i){
  const t = results[i];
  if(!t) return;
  navigator.clipboard.writeText(t).then(function(){
    document.getElementById('ok'+i).classList.add('show');
  }).catch(function(){
    const ta = document.createElement('textarea');
    ta.value = t;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    document.getElementById('ok'+i).classList.add('show');
  });
}
</script>
